<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEBULA ARCADE</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>
  <!-- CryptoJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <!-- Основной CSS -->
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <!-- Canvas для звёздного фона -->
  <canvas id="starfield-canvas"></canvas>
  
  <!-- Основной контейнер приложения -->
  <div id="app">
    <!-- Хедер -->
    <header id="main-header">
      <div class="logo">NEBULA ARCADE</div>
      <div class="header-actions">
        <!-- Гостевой блок -->
        <div id="guest-actions" class="auth-buttons">
          <button id="login-btn" class="glass-btn">Вход</button>
          <button id="register-btn" class="accent-btn">Регистрация</button>
        </div>
        <!-- Авторизованный блок -->
        <div id="user-actions" class="user-panel" style="display: none;">
          <div class="balance">
            <i data-feather="dollar-sign" class="icon"></i>
            <span id="balance-value">0</span>
          </div>
          <button id="shop-btn" class="icon-btn" title="Магазин">
            <i data-feather="shopping-cart"></i>
          </button>
          <button id="inventory-btn" class="icon-btn" title="Скины">
            <i data-feather="award"></i>
          </button>
          <div class="avatar" id="user-avatar">
            <span id="avatar-letter">U</span>
          </div>
        </div>
        <!-- Кнопка Fullscreen -->
        <button id="fullscreen-btn" class="icon-btn" title="Полный экран">
          <i data-feather="maximize"></i>
        </button>
      </div>
    </header>

    <!-- Поисковая строка -->
    <div class="search-wrapper">
      <div class="search-container">
        <i data-feather="search" class="search-icon"></i>
        <input type="text" id="game-search" placeholder="Поиск игр..." autocomplete="off">
      </div>
    </div>

    <!-- Главное меню (сетка игр) -->
    <main id="game-grid" class="game-grid">
      <!-- Карточки будут сгенерированы динамически -->
    </main>

    <!-- Контейнер для матчмейкинга и игр (скрыт по умолчанию) -->
    <div id="matchmaking-screen" class="fullscreen-overlay" style="display: none;">
      <div class="matchmaking-content">
        <div class="radar-container">
          <canvas id="radar-canvas" width="200" height="200"></canvas>
        </div>
        <h2 id="matchmaking-status">Поиск игрока...</h2>
        <div id="matchmaking-timer">00:00</div>
        <button id="cancel-matchmaking" class="glass-btn">Отмена</button>
      </div>
    </div>

    <div id="game-container" style="display: none;">
      <!-- Здесь будет рендериться активная игра -->
    </div>

    <!-- Модальные окна -->
    <!-- Окно входа/регистрации -->
    <div id="auth-modal" class="modal" style="display: none;">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="auth-modal-title">Вход</h2>
          <button class="modal-close">&times;</button>
        </div>
        <form id="auth-form">
          <div class="input-group">
            <label for="auth-nickname">Никнейм</label>
            <input type="text" id="auth-nickname" placeholder="PlayerOne" required pattern="[A-Za-z0-9_]{3,16}">
            <div class="error-message" data-for="auth-nickname"></div>
          </div>
          <div class="input-group">
            <label for="auth-password">Пароль</label>
            <input type="password" id="auth-password" placeholder="******" required minlength="6">
            <div class="error-message" data-for="auth-password"></div>
          </div>
          <div class="input-group" id="confirm-password-group" style="display: none;">
            <label for="auth-confirm">Подтвердите пароль</label>
            <input type="password" id="auth-confirm" placeholder="******">
            <div class="error-message" data-for="auth-confirm"></div>
          </div>
          <button type="submit" id="auth-submit" class="accent-btn full-width">
            <span class="btn-text">Войти</span>
            <span class="spinner" style="display: none;"></span>
          </button>
        </form>
        <p class="modal-footer">
          <span id="toggle-auth-mode">Нет аккаунта? Зарегистрироваться</span>
        </p>
      </div>
    </div>

    <!-- Магазин -->
    <div id="shop-modal" class="modal" style="display: none;">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Магазин</h2>
          <button class="modal-close">&times;</button>
        </div>
        <div class="shop-tabs">
          <button class="tab-btn active" data-tab="skins">Скины</button>
          <button class="tab-btn" data-tab="boosters">Бустеры</button>
        </div>
        <div class="tab-content" id="skins-tab">
          <div class="skins-grid" id="skins-container"></div>
        </div>
        <div class="tab-content" id="boosters-tab" style="display: none;">
          <div class="coming-soon">Скоро</div>
        </div>
      </div>
    </div>

    <!-- Инвентарь (смена скина) -->
    <div id="inventory-modal" class="modal" style="display: none;">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Мои скины</h2>
          <button class="modal-close">&times;</button>
        </div>
        <div class="skins-grid" id="inventory-container"></div>
      </div>
    </div>
  </div>

  <!-- Основной скрипт как модуль -->
  <script type="module" src="src/js/main.js"></script>
</body>
</html>
